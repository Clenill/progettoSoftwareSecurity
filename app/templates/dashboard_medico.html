<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Medico - Portale Visite</title>
    <link rel="stylesheet" href="/css/style.css"> </head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="/images/logo.png" style="height: 40px; vertical-align: middle;" alt="Logo"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/staff">Home</a></li>
        </ul>
    </div>
</nav>

<h1>La mia Agenda</h1>
<table id="agendaTable">
    <thead>
        <tr>
            <th>Paziente</th>
            <th>Data/Ora</th>
            <th>Stato</th>
            <th>Prove Caricate</th> <th>Azione</th>
        </tr>
    </thead>
    <tbody id="agendaBody"></tbody>
</table>

<script>
async function caricaAgenda() {
    const response = await fetch('/visit/visits/my-agenda', {
        credentials: 'same-origin'
    });
    const visite = await response.json();
    const body = document.getElementById('agendaBody');
    body.innerHTML = '';

    visite.forEach(v => {
        const row = document.createElement('tr');
        
        const dataFormattata = new Date(v.timestamp).toLocaleString('it-IT');

        let proveHtml = '';
        if (v.prove && v.prove.length > 0) {
            proveHtml = v.prove.map(p => p.tipo).join(', ');
        } else {
            proveHtml = '<i>Nessuna</i>';
        }

        const confirmBtn = !v.confermata 
            ? `<button onclick="confermaVisita('${v.id}')" style="margin-bottom: 5px;">Conferma Visita</button><br>` 
            : '';

        const formProve = `
            <div style="margin-top: 5px;">
                <select id="select-evidence-${v.id}">
                    <option value="sintomi">Sintomi</option>
                    <option value="attrezzatura">Attrezzatura</option>
                    <option value="prescrizione">Prescrizione</option>
                    <option value="gps">GPS</option>
                </select>
                <button onclick="inviaProva('${v.id}')">Carica Prova</button>
            </div>
        `;

        const btnDettagli = `<a href="/dettagli-visita?id=${v.id}" class="btn btn-primary" style="padding: 6px 12px; background-color: #3498db; color: white; text-decoration: none; border-radius: 4px;">Gestisci Visita</a>`;

        row.innerHTML = `
            <td>${v.paziente}</td>
            <td>${dataFormattata}</td>
            <td>${v.confermata ? '✅ Confermata' : '⏳ In attesa'}</td>
            <td>${proveHtml}</td>
            <td>${btnDettagli}</td>
        `;
        body.appendChild(row);
    });
}

async function inviaProva(visitId) {
    const tipoProva = document.getElementById(`select-evidence-${visitId}`).value;

    try {
        const response = await fetch(`/visit/addevidence/${visitId}`, {
            method: 'POST',
            credentials: 'same-origin', 
            headers: { 
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ tipo: tipoProva })
        });
        
        if (response.ok) {
            alert(`Prova "${tipoProva}" caricata con successo!`);
            caricaAgenda(); // Ricarica la tabella per aggiornare la colonna "Prove Caricate"
        } else {
            const errData = await response.json();
            alert("Errore: " + (errData.detail || "Impossibile caricare la prova."));
        }
    } catch (err) {
        console.error("Errore di connessione", err);
    }
}

document.addEventListener('DOMContentLoaded', caricaAgenda);
</script>
</body>
</html>
