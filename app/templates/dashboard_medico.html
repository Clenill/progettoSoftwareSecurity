<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Medico - Portale Visite</title>
    <link rel="stylesheet" href="/css/style.css"> 
    <script src="/js/functions.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="/images/logo.png" style="height: 40px; vertical-align: middle;" alt="Logo"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/staff">Home</a></li>
        </ul>
        <div class="col-md-2">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<h1>La mia Agenda</h1>

<style>
#toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: white;
    border-radius: 8px;
    padding: 1rem 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    font-size: 0.95rem;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 9999;
    min-width: 280px;
    text-align: center;
    pointer-events: none;
}
#toast.show {
    opacity: 1 !important;
    transform: translateX(-50%) translateY(0) !important;
}
#toast .toast-title { font-weight: bold; margin-bottom: 0.3rem; }
#toast .toast-body { color: #555; }
#toast.toast-success { border-left: 4px solid #27ae60; }
#toast.toast-success .toast-title { color: #27ae60; }
#toast.toast-error { border-left: 4px solid #e74c3c; }
#toast.toast-error .toast-title { color: #e74c3c; }

/* Tabella agenda: più compatta e centrata invece che a tutta larghezza */
#agendaTable {
    width: 85%;
    max-width: 950px;
    margin: 1.5rem auto;
    border-collapse: collapse;
    font-size: 0.9rem;
}
#agendaTable th,
#agendaTable td {
    padding: 8px 10px;
    border-bottom: 1px solid #e0e0e0;
    vertical-align: middle;
}
#agendaTable th {
    background-color: #f5f6f7;
    text-align: left;
    font-size: 0.85rem;
}

/* Lista prove incolonnate */
.prove-list {
    list-style: none;
    margin: 0;
    padding: 0;
}
.prove-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 2px 0;
    white-space: nowrap;
}
.prova-check {
    color: #27ae60;
    font-weight: bold;
}
.prova-cross {
    color: #e74c3c;
    font-weight: bold;
}
</style>

<table id="agendaTable">
    <thead>
        <tr>
            <th>Paziente</th>
            <th>Data/Ora</th>
            <th>Stato</th>
            <th>Prove Caricate</th> 
            <th>Azione</th>
        </tr>
    </thead>
    <tbody id="agendaBody"></tbody>
</table>

<script>

function showToast(titolo, messaggio, tipo = 'toast-success', durata = 3000) {
    const toast = document.getElementById('toast');
    toast.innerHTML = `
        <div class="toast-title">${titolo}</div>
        <div class="toast-body">${messaggio}</div>
    `;
    toast.className = tipo;
    void toast.offsetHeight;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), durata);
}

async function caricaAgenda() {
    const response = await fetch('/visit/visits/my-agenda-full', {
        credentials: 'same-origin'
    });

    const visite = await response.json();

    const body = document.getElementById('agendaBody');
    body.innerHTML = '';

    visite.forEach(v => {
        const row = document.createElement('tr');
        const dataFormattata = new Date(v.timestamp).toLocaleString('it-IT');

        // Prove incolonnate: nome prova a sinistra, spunta verde/croce rossa a destra
        const proveHtml = v.prove && v.prove.length > 0
            ? '<ul class="prove-list">' + v.prove.map(p => {
                const icona = p.valore
                    ? '<span class="prova-check">&#10003;</span>'
                    : '<span class="prova-cross">&#10007;</span>';
                return `<li><span>${p.tipo}</span>${icona}</li>`;
            }).join('') + '</ul>'
            : '<i>Nessuna</i>';

        const nomePaziente = v.nome_paziente || v.paziente;

        // Bottone conferma: blu se non confermata, verde se confermata
        const coloreConferma = v.confermata ? '#27ae60' : '#e67e22';
        const testoConferma = v.confermata ? '✓ Confermata' : 'Conferma Visita';
        const disabilitaConferma = v.confermata ? 'disabled' : '';
        // Dopo le variabili per il bottone conferma, aggiungi:
        const coloreProva = v.confermata ? '#27ae60' : '#aaaaaa';
        const disabilitaProva = !v.confermata ? 'disabled' : '';

        const formProve = `
            <div style="margin-top: 5px;">
                <select id="select-evidence-${v.id}" ${disabilitaProva}>
                    <option value="sintomi">Sintomi</option>
                    <option value="attrezzatura">Attrezzatura</option>
                    <option value="prescrizione">Prescrizione</option>
                    <option value="gps">GPS</option>
                </select>
                <label>Prova presente </label>
                <input type="checkbox" id="valoreProva-${v.id}" checked="checked">
                <button onclick="inviaProva('${v.id}')" 
                style="background-color: ${coloreProva};"
                ${disabilitaProva}>
                Carica Prova
                </button>
            </div>
        `;

        const rifiutaProva = v.confermata ? '' : `<button onclick="rifiutaVisita('${v.id}')" style="background-color: ${coloreConferma}; margin-bottom: 5px;" ${disabilitaConferma}>Rifiuta Visita</button>`;

        row.innerHTML = `
            <td>${nomePaziente}</td>
            <td>${dataFormattata}</td>
            <td>
                 <button onclick="confermaVisita('${v.id}')"
                    style="background-color: ${coloreConferma}; margin-bottom: 5px;"
                    ${disabilitaConferma}>
                    ${testoConferma}
                </button>` + rifiutaProva + `
            </td>
            <td>${proveHtml}</td>
            <td>
                ${formProve}
                <a href="/dettagli-visita?id=${v.id}" class="btn btn-primary"
                   style="display:inline-block; margin-top: 5px; padding: 6px 12px;
                          background-color: #3498db; color: white;
                          text-decoration: none; border-radius: 4px;">
                    Gestisci Visita
                </a>
            </td>
        `;
        body.appendChild(row);
    });
}

async function confermaVisita(visitId) {
    try {
        const response = await fetch(`/visit/visits/${visitId}/confirm`, {
            method: 'PUT',
            credentials: 'same-origin'
        });
        if (response.ok) {
            showToast("✓ Visita confermata", "La visita è stata confermata correttamente.", "toast-success");
            setTimeout(() => caricaAgenda(), 1000);
        } else {
            showToast("✗ Errore", "Impossibile confermare la visita.", "toast-error");
        }
    } catch (err) {
        showToast("✗ Errore di connessione", err.message, "toast-error");
    }
}

async function rifiutaVisita(id) {
    const response = await fetch(`/visit/denied-visit/${id}`, {
        method: 'DELETE', 
        credentials: 'same-origin'
    });

    if (response.ok) {
        showToast("✓ Visita rifiutata", "La visita è stata rimossa.", "toast-success");
        setTimeout(() => window.location.replace("/dashboard/staff"), 500);
    }
    else {
        showToast("✗ Errore", "Impossibile rifiutare la visita.", "toast-error");
    }
}

async function inviaProva(visitId) {
    const tipoProva = document.getElementById(`select-evidence-${visitId}`).value;
    const valoreProva = document.getElementById(`valoreProva-${visitId}`).checked;

    try {
        const response = await fetch(`/visit/addevidence/${visitId}`, {
            method: 'POST',
            credentials: 'same-origin', 
            headers: { 
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ tipo: tipoProva, valore: valoreProva })
        });
        
        if (response.ok) {
            showToast("✓ Prova caricata", `La prova "${tipoProva}" è stata caricata con successo.`, "toast-success");
            setTimeout(() => caricaAgenda(), 500);
        } else {
            const errData = await response.json();
            showToast("✗ Errore", errData.detail || "Impossibile caricare la prova.", "toast-error");
        }
    } catch (err) {
        showToast("✗ Errore di connessione", err.message, "toast-error");
    }
}

document.addEventListener('DOMContentLoaded', caricaAgenda);
</script>
<div id="toast"></div>
</body>
</html>
