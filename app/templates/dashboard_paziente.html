</center><h1>Seleziona un medico</h1>
<div id="booking-section">
    <select id="medicoSelect" required>
        <option value="">Seleziona un medico</option>
    </select>
    <div id="disponibilitaContainer"></div>
</div>

<script>
let mioIdPaziente = null;

async function caricaMedici() {
    try {
        const response = await fetch('/api/getusers', {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const users = await response.json();
        const select = document.getElementById('medicoSelect');
        
        select.innerHTML = '<option value="">Seleziona un medico</option>';
        
        users.forEach(user => {
            if (user.ruolo === 'staff') { 
                const option = document.createElement('option');
                option.value = user.id;
                option.textContent = user.name;
                select.appendChild(option);
            }
        });
    } catch (err) {
        console.error("Errore nel caricamento dei medici:", err);
    }
}

async function prenotaVisita(medicoId, timestamp) {
    if (!mioIdPaziente) {
        alert("Errore: Profilo non caricato. Ricarica la pagina.");
        return;
    }

    const payload = {
        paziente: mioIdPaziente,
        medico: medicoId,
        timestamp: timestamp
    };

    try {
        const response = await fetch('/visit/visits/prenota', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}` 
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("Prenotazione effettuata!");
            caricaStorico();
            caricaDisponibilita();
        } else {
            alert("Errore nella prenotazione.");
        }
    } catch (err) {
        console.error("Errore:", err);
    }
}

async function caricaDisponibilita() {
    const medicoId = document.getElementById('medicoSelect').value;
    const container = document.getElementById('disponibilitaContainer');
    
    if (!medicoId) {
        container.innerHTML = '';
        return;
    }

    try {
        const response = await fetch(`/api/disponibilita/${medicoId}`, {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });

        if (!response.ok) {
            container.innerHTML = '<p>Nessuna disponibilità trovata.</p>';
            return;
        }

        const data = await response.json();
        container.innerHTML = '<h4>Disponibilità:</h4>';
        
        const raggruppati = data.reduce((acc, slot) => {
            const dataGiorno = slot.valore.split('T')[0];
            if (!acc[dataGiorno]) acc[dataGiorno] = [];
            acc[dataGiorno].push(slot);
            return acc;
        }, {});

        for (const [dataGiorno, orari] of Object.entries(raggruppati)) {
            const gruppo = document.createElement('div');
            gruppo.innerHTML = `<h5>${dataGiorno}</h5>`;
            
            orari.forEach(s => {
                const btn = document.createElement('button');
                btn.textContent = s.orario;
                btn.className = 'slot-btn';
                btn.onclick = () => prenotaVisita(medicoId, s.valore);
                gruppo.appendChild(btn);
            });
            container.appendChild(gruppo);
        }
    } catch (err) {
        console.error("Errore caricamento:", err);
    }
}

async function recuperaProfilo() {
    try {
        const response = await fetch('/api/getusers/me', {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (response.ok) {
            const utente = await response.json();
            mioIdPaziente = utente.id; // Salviamo l'UUID corretto
        }
    } catch (err) {
        console.error("Errore recupero profilo:", err);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    caricaMedici();
    document.getElementById('medicoSelect').addEventListener('change', caricaDisponibilita);
    recuperaProfilo();
});
</script>
</body>
</html>
