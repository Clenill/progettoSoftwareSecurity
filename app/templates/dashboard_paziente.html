<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuto nel Nostro Portale</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/functions.js"></script>
</head>
<body>

<!-- Menu di Navigazione -->
<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="images/logo.png"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/utente">Home</a></li>
            <li class="nav-item"><a href="/utente/prenota"  class="active">Prenota</a></li>
            <li class="nav-item"><a href="/utente/visite">Visualizza</a></li>
        </ul>
        <div class="col-md-2">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</nav>
<h1>Prenota visita</h1>

<div id="booking-section">

    <label>Medico</label>

    <select id="medicoSelect">
        <option value="">Seleziona medico</option>
    </select>

    <br><br>

    <label>Giorno</label>

    <input
        type="date"
        id="giornoSelect">

    <br><br>

    <button onclick="caricaDisponibilita()">
        Mostra orari disponibili
    </button>

    <hr>

    <div id="disponibilitaContainer"></div>

</div>

<script>
let mioIdPaziente = null;

async function caricaMedici() {
    try {
        const response = await fetch('/api/getusers', {
            credentials: 'same-origin'
        });
        // Controlla che la risposta è JSON
        const contentType = response.headers.get("content-type");
        if (!response.ok || !contentType?.includes("application/json")) {
            console.error("Risposta non valida:", response.status, contentType);
            return;
        }
        const users = await response.json();
        const select = document.getElementById('medicoSelect');
        select.innerHTML = '<option value="">Seleziona un medico</option>';
        users.forEach(user => {
            if (user.ruolo === 'staff') { 
                const option = document.createElement('option');
                option.value = user.id;
                option.textContent = user.name;
                select.appendChild(option);
            }
        });
    } catch (err) {
        console.error("Errore nel caricamento dei medici:", err);
    }
}

async function prenotaVisita(medicoId, timestamp) {
    if (!mioIdPaziente) {
        alert("Errore: Profilo non caricato. Ricarica la pagina.");
        return;
    }

    const payload = {
        paziente: mioIdPaziente,
        medico: medicoId,
        timestamp: timestamp
    };

    
    const response = await fetch('/visit/visits/prenota', {
        method: 'POST',
        credentials: 'same-origin', 
        headers: { 
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload)
    });

    if (response.ok) {
        alert("Richiesta visita effettuata correttamente!");
        caricaDisponibilita();
    } else {
        alert("Errore nella prenotazione.");
    }
    
}

async function caricaDisponibilita() {
    const medicoId = document.getElementById('medicoSelect').value;
    const giorno = document.getElementById("giornoSelect").value;
    const container = document.getElementById('disponibilitaContainer');
    container.innerHTML = '';
    if (!medicoId) {
        container.innerHTML = '';
        return;
    }

    try {
        const response = await fetch(
            `/visit/disponibilita/${medicoId}?giorno=${giorno}`,
            {
            credentials: 'same-origin'
            }
        );

        if (!response.ok) {
            container.innerHTML = '<p>Nessuna disponibilità trovata.</p>';
            return;
        }

        const slots = await response.json();

    if(slots.length===0){

        container.innerHTML="<p>Nessun orario disponibile.</p>";

        return;
    }

    const titolo=document.createElement("h3");
    titolo.textContent="Orari disponibili";
    container.appendChild(titolo);

    slots.forEach(slot=>{
        const button=document.createElement("button");
        button.className="slot-btn";
        button.textContent=slot.orario;
        button.onclick=()=>prenotaVisita(
            medicoId,
            slot.timestamp
        );
        container.appendChild(button);
    });
    } catch (err) {
        console.error("Errore caricamento:", err);
    }
}

async function recuperaProfilo() {
    try {
        const response = await fetch('/api/getusers/me', {
            credentials: 'same-origin'
        });
        const contentType = response.headers.get("content-type");
        if (!response.ok || !contentType?.includes("application/json")) {
            console.error("Sessione non valida o risposta HTML:", response.status);
            return;
        }
        const utente = await response.json(); // ← una sola lettura
        mioIdPaziente = utente.id;
        
    } catch (err) {
        console.error("Errore recupero profilo:", err);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    caricaMedici();
    //document.getElementById('medicoSelect').addEventListener('change', caricaDisponibilita);
    recuperaProfilo();
});
</script>
</body>
</html>
