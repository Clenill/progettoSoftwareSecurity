<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuto nel Nostro Portale</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/functions.js"></script>
</head>
<body>

<!-- Menu di Navigazione -->
<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="/images/logo.png"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/utente">Home</a></li>
            <li class="nav-item"><a href="/utente/prenota">Prenota</a></li>
            <li class="nav-item"><a href="/utente/visite"  class="active">Visualizza</a></li>
        </ul>
        <div class="col-md-2">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<h1>Le tue visite</h1>
<ul id="listaVisite"></ul>

<style>
#toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: white;
    border-left: 4px solid #3498db;
    border-radius: 8px;
    padding: 1rem 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    font-size: 0.95rem;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 9999;
    min-width: 280px;
    text-align: center;
}
#toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
#toast .toast-title {
    font-weight: bold;
    color: #3498db;
    margin-bottom: 0.3rem;
}
#toast .toast-body {
    color: #555;
}
</style>

<script>

async function caricaStorico() {
    try {
        // Carica medici e visite in parallelo
        const [responseMedici, responseVisite] = await Promise.all([
            fetch('/api/getusers', { credentials: 'same-origin' }),
            fetch('/visit/allmyvisits', { credentials: 'same-origin' })
        ]);

        const utenti = await responseMedici.json();
        const visite = await responseVisite.json();
        // Mappa id → nome
        const nomeMedico = {};
        utenti.forEach(u => { nomeMedico[u.id] = u.name; });

        const contenitore = document.getElementById('listaVisite');

        contenitore.innerHTML = '';

        if (visite.length === 0) {
            contenitore.innerHTML = '<p>Nessuna visita in storico.</p>';
            return;
        }

        // Intestazione tabella
        let tableHTML = `
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Giorno</th>
                        <th>Ora</th>
                        <th>Medico</th>
                        <th>Confermata</th>
                        <th>Prove</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
        `;

        // Riempimento tabella
        visite.forEach(v => {
            const dataOggetto = new Date(v.timestamp);
            const giorno = dataOggetto.toLocaleDateString('it-IT');
            const ora = dataOggetto.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            
            // Testo leggibile per la colonna confermata
            const confermataText = v.confermata ? 'Confermata' : 'Non confermata';
            // Controlla se il paziente ha già inviato la prova CONFERMA
            const provaGiaInviata = v.prove && v.prove.some(p => p.tipo === 'conferma');
            // Disabilitato se visita non confermata dal medico, O se prova già inviata
            const disabilitato = (!v.confermata || provaGiaInviata) ? 'disabled' : '';
            // Verde se prova già inviata, blu se confermata e ancora da inviare, grigio se non confermata
            const coloreBottone = provaGiaInviata ? '#27ae60' : (v.confermata ? '#3498db' : '#aaaaaa');
            // Testo bottone aggiornato
            const testoBottone = provaGiaInviata ? '✓ Prova già inviata' : 'Invia prova';
            // Usa il nome dalla mappa, fallback all'id se non trovato
            const nomeMed = nomeMedico[v.medico] || v.medico;

            tableHTML += `
                <tr>
                    <td>${giorno}</td>
                    <td>${ora}</td>
                    <td>${nomeMed}</td>
                    <td>${confermataText}</td>
                    <td>${v.prove && v.prove.length > 0 ? v.prove.map(p => p.tipo).join(', ') : 'Nessuna'}</td>
                    <td>
                        <label>Il medico è presente: </label>
                        <input id="${v.id}-checkbox" type="checkbox" ${v.confermata ? 'checked' : ''} ${disabilitato}>
                        <button type="submit" onclick="confermaPresenza('${v.id}')" style="background-color: ${coloreBottone};" ${disabilitato}>${testoBottone}</button>
                    </td>
                </tr>
            `;
        });

        tableHTML += `
                </tbody>
            </table>
        `;

        contenitore.innerHTML = tableHTML;

    } catch (err) {
        console.error("Errore caricaStorico:", err);
        document.getElementById('listaVisite').innerHTML = '<p class="error">Errore nel caricamento dei dati.</p>';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    caricaStorico();
});

function showToast(titolo, messaggio, durata = 2000) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        document.body.appendChild(toast);
    }
    toast.innerHTML = `
        <div class="toast-title">${titolo}</div>
        <div class="toast-body">${messaggio}</div>
    `;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, durata);
}

async function confermaPresenza(id) {
    //const id = element.id;
    const checkbox = document.getElementById(`${id}-checkbox`);
    //const checkbox = element.querySelector('input[type="checkbox"]');
    if(checkbox) {
        const bodyData = {
            tipo: 'conferma', 
            valore: checkbox.checked
        };

        try {
            const response = await fetch(`/visit/addevidence/${id}`, {
                method: 'POST', 
                credentials: 'same-origin', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(bodyData)
            });

            if(!response.ok) {
                alert("Errore: " + ((await response.json()).detail || 'Salvataggio fallito'));
            }

            else {
                showToast("✓ Prova inviata", "La tua conferma è stata registrata correttamente.");
                setTimeout(() => window.location.reload(), 1000);
            }
        }

        catch(err) {
            alert('Errore: ', err);
        }
    }

    else {
        alert('Errore: elemento non trovato');
    }
}

</script>
</body>
</html>
