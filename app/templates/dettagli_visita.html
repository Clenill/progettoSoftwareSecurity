<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettagli Visita - Portale Medico</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/functions.js"></script>
    <style>
        .nav-container button {
    background-color: #3498db;
    }
    .nav-container button:hover:not(:disabled) {
    background-color: #2980b9;
    }
        .details-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .info-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .info-group span { font-weight: bold; color: #2c3e50; }
        .info-group button { margin: 10px; }
        .action-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 30px; border: 1px solid #e0e0e0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group select, .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:hover:not(:disabled) { background-color: #27ae60; }
        button:disabled { background-color: #aaaaaa; cursor: not-allowed; }
        .btn-back { background-color: #95a5a6; margin-bottom: 20px; display: inline-block; padding: 8px 15px; color: white; text-decoration: none; border-radius: 4px; }
        #btnSalvaProva { background-color: #3498db; }
        #btnSalvaProva:hover:not(:disabled) { background-color: #2980b9; }
        #btnSalvaProva:disabled { background-color: #aaaaaa; cursor: not-allowed; }
    /* Toast */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: white;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            font-size: 0.95rem;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
            min-width: 280px;
            text-align: center;
            pointer-events: none;
        }
        #toast.show { opacity: 1 !important; transform: translateX(-50%) translateY(0) !important; }
        #toast .toast-title { font-weight: bold; margin-bottom: 0.3rem; }
        #toast .toast-body { color: #555; }
        #toast.toast-success { border-left: 4px solid #27ae60; }
        #toast.toast-success .toast-title { color: #27ae60; }
        #toast.toast-error { border-left: 4px solid #e74c3c; }
        #toast.toast-error .toast-title { color: #e74c3c; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="/images/logo.png" style="height: 40px; vertical-align: middle;" alt="Logo"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/staff">Home</a></li>
        </ul>
        <div class="col-md-2">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="details-container">
    <a href="/dashboard/staff" class="btn-back">⬅ Torna Indietro</a>
    
    <h2>Dettagli Visita</h2>
    
    <div id="visitInfo">
        <p>Caricamento dati in corso...</p>
    </div>

    <div class="action-panel" id="actionPanel" style="display: none;">
        <h3 style="margin-bottom: 15px;">Azioni Medico</h3>
        
        <div class="info-group" id="confermaContainer">
            </div>

        <h4>Carica Nuova Prova</h4>
        <form id="evidenceForm" style="margin-top: 15px;">
            <div class="form-group">
                <label>Tipo di Prova:</label>
                <select id="tipoProva">
                    <option value="sintomi">Sintomi</option>
                    <option value="attrezzatura">Attrezzatura</option>
                    <option value="prescrizione">Prescrizione</option>
                    <option value="gps">GPS</option>
                </select>
            </div>
            
            <button type="submit" id="btnSalvaProva">Salva Prova</button>
        </form>
    </div>
</div>

<div id="toast"></div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const visitId = urlParams.get('id');

function showToast(titolo, messaggio, tipo = 'toast-success', durata = 3000) {
    const toast = document.getElementById('toast');
    toast.innerHTML = `
        <div class="toast-title">${titolo}</div>
        <div class="toast-body">${messaggio}</div>
    `;
    toast.className = tipo;
    void toast.offsetHeight;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), durata);
}

document.addEventListener('DOMContentLoaded', caricaDettagli);

async function caricaDettagli() {
    if (!visitId) {
        document.getElementById('visitInfo').innerHTML = "<p style='color:red;'>Nessun ID visita specificato.</p>";
        return;
    }

    try {
        const [responseVisita, responseUtenti] = await Promise.all([
            fetch(`/visit/dettagliovisita/${visitId}`, { credentials: 'same-origin' }),
            fetch('/api/getusers', { credentials: 'same-origin' })
        ]);

        if (!responseVisita.ok) throw new Error("Errore nel recupero dei dettagli");

        const v = await responseVisita.json();
        const utenti = await responseUtenti.json();

        // Mappa id → nome
        const nomeUtente = {};
        utenti.forEach(u => { nomeUtente[u.id] = u.name; });

        const nomePaziente = nomeUtente[v.paziente] || v.paziente;
        
        const dataFormattata = new Date(v.timestamp).toLocaleString('it-IT');
        const proveHtml = v.prove && v.prove.length > 0 
            ? v.prove.map(p => p.tipo).join(', ') 
            : 'Nessuna prova caricata';

        document.getElementById('visitInfo').innerHTML = `
            <div class="info-group"><span>Nome Paziente:</span> ${nomePaziente}</div>
            <div class="info-group"><span>Data e Ora:</span> ${dataFormattata}</div>
            <div class="info-group"><span>Stato:</span> ${v.confermata ? '✅ Confermata' : '⏳ In attesa di conferma'}</div>
            <div class="info-group"><span>Prove Attuali:</span> ${proveHtml}</div>
        `;

        document.getElementById('actionPanel').style.display = 'block';

        // Bottone salva prova: disabilitato se visita non confermata
        const btnSalva = document.getElementById('btnSalvaProva');
        if (!v.confermata) {
            btnSalva.disabled = true;
            btnSalva.title = 'Disponibile solo dopo la conferma della visita';
        } else {
            btnSalva.disabled = false;
        }

        const confermaContainer = document.getElementById('confermaContainer');
        if (!v.confermata) {
            confermaContainer.innerHTML = `
                <button onclick="confermaVisita('${v.id}')" style="background-color: #3498db; margin-right: 10px;">Conferma Questa Visita</button>
                <button onclick="rifiutaVisita('${v.id}')" style="background-color: #e74c3c;">Rifiuta Questa Visita</button>
            `;
        } else {
            confermaContainer.innerHTML = `<p style="color: #27ae60; font-weight: bold;">✔ Visita Confermata</p>`;
        }

    } catch (err) {
        document.getElementById('visitInfo').innerHTML = "<p style='color:red;'>Impossibile caricare i dettagli della visita.</p>";
    }
}

async function confermaVisita(id) {
    const response = await fetch(`/visit/visits/${id}/confirm`, {
        method: 'PUT',
        credentials: 'same-origin'
    });
    if (response.ok) {
       showToast("✓ Visita confermata", "La visita è stata confermata correttamente.", "toast-success");
        setTimeout(() => caricaDettagli(), 1500);
    } else {
        showToast("✗ Errore", "Impossibile confermare la visita.", "toast-error");
    }
}

async function rifiutaVisita(id) {
    const response = await fetch(`/visit/denied-visit/${id}`, {
        method: 'DELETE', 
        credentials: 'same-origin'
    });
    if (response.ok) {
        showToast("✓ Visita rifiutata", "La visita è stata rimossa.", "toast-success");
        setTimeout(() => window.location.replace('/dashboard/staff'), 1500);
    } else {
        showToast("✗ Errore", "Impossibile rifiutare la visita.", "toast-error");
    }
}

document.getElementById('evidenceForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const tipo = document.getElementById('tipoProva').value;

    try {
        const response = await fetch(`/visit/addevidence/${visitId}`, {
            method: 'POST',
            credentials: 'same-origin', 
            headers: { 
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ tipo: tipo })
        });
        
        if (response.ok) {
            showToast("✓ Prova salvata", `La prova "${tipo}" è stata caricata con successo.`, "toast-success");
            setTimeout(() => caricaDettagli(), 1500);
        } else {
            const errData = await response.json();
            showToast("✗ Errore", errData.detail || "Salvataggio fallito.", "toast-error");
        }
    } catch (err) {
        showToast("✗ Errore di connessione", err.message, "toast-error");    }
});
</script>
</body>
</html>
