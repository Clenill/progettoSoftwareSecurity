<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuto nel Nostro Portale</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/functions.js"></script>
</head>
<body>

<!-- Menu di Navigazione -->
<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="/images/logo.png"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/authority">Home</a></li>
            <li class="nav-item"><a href="/lista-utenti" class="active">Gestisci Utenti</a></li>
            <li class="nav-item"><a href="/admin/prenota">Nuova Visita</a></li>
            <li class="nav-item"><a href="/gestione-probabilita">Gestione Probabilità</a></li>
        </ul>
        <div class="col-md-2">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<h1>Lista Utenti Registrati</h1>
<ul id="listaUtenti"></ul>

<div id="toast"></div>

<style>
#toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: white; border-radius: 8px; padding: 1rem 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-size: 0.95rem;
    opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 9999; min-width: 280px; text-align: center; pointer-events: none;
}
#toast.show { opacity: 1 !important; transform: translateX(-50%) translateY(0) !important; }
#toast .toast-title { font-weight: bold; margin-bottom: 0.3rem; }
#toast .toast-body { color: #555; }
#toast.toast-success { border-left: 4px solid #27ae60; }
#toast.toast-success .toast-title { color: #27ae60; }
#toast.toast-error { border-left: 4px solid #e74c3c; }
#toast.toast-error .toast-title { color: #e74c3c; }
</style>

<script>

function showToast(titolo, messaggio, tipo = 'toast-success', durata = 3000) {
    const toast = document.getElementById('toast');
    toast.innerHTML = `<div class="toast-title">${titolo}</div><div class="toast-body">${messaggio}</div>`;
    toast.className = tipo;
    void toast.offsetHeight;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), durata);
}

async function caricaUtenti() {
    try {
        const response = await fetch('/admin/allusers', {
            credentials: 'same-origin'
        });
        const utenti = await response.json();
        const contenitore = document.getElementById('listaUtenti');

        console.log('utenti:', utenti);

        contenitore.innerHTML = '';

        if (utenti.length === 0) {
            contenitore.innerHTML = '<p>Nessun utente registrato.</p>';
            return;
        }

        // Intestazione tabella
        let tableHTML = `
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Ruolo</th>
                        <th>Attivo</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
        `;

        // Riempimento tabella
        utenti.forEach(u => {
            const statoText = u.attivo
                ? '<span style="color: #27ae60; font-weight: bold;">✔ Attivo</span>'
                : '<span style="color: #e74c3c; font-weight: bold;">✘ Non attivo</span>';

            const coloreBottone = u.attivo ? '#aaaaaa' : '#27ae60';
            const testoBottone = u.attivo ? 'Già attivo' : 'Attiva';
            const disabilitato = u.attivo ? 'disabled' : '';

            tableHTML += `
                <tr>
                    <td><a href="/dettagliutente/${u.id}">${u.name}</a></td>
                    <td>${u.email}</td>
                    <td>${u.ruolo}</td>
                    <td>${statoText}</td>
                    <td>
                        <button onclick="attivaUtente('${u.id}')"
                            style="background-color: ${coloreBottone};"
                            ${disabilitato}>
                            ${testoBottone}
                        </button>
                    </td>
                </tr>
            `;
        });

        tableHTML += `
                </tbody>
            </table>
        `;

        contenitore.innerHTML = tableHTML;

    } catch (err) {
        console.error("Errore caricamento utenti", err);
        document.getElementById('listaUtenti').innerHTML = '<p class="error">Errore nel caricamento dei dati.</p>';
    }
}

async function attivaUtente(id) {
    try {
        const response = await fetch(`/admin/activeuser/${id}`, {
            method: 'POST', 
            credentials: 'same-origin'
        });

         if (response.ok) {
            showToast("✓ Utente attivato", "L'utente è stato attivato correttamente.", "toast-success");
            setTimeout(() => caricaUtenti(), 1000);
        } else {
            showToast("✗ Errore", "Impossibile attivare l'utente.", "toast-error");
        }
    } catch(err) {
        showToast("✗ Errore di connessione", err.message, "toast-error");
    }
}

document.addEventListener('DOMContentLoaded', () => {
    caricaUtenti();
});

</script>
</body>
</html>
