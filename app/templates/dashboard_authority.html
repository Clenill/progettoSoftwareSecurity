<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Authority</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/functions.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="/images/logo.png" style="height: 40px; vertical-align: middle;" alt="Logo"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/authority" class="active">Home</a></li>
            <li class="nav-item"><a href="/lista-utenti">Gestisci Utenti</a></li>
            <li class="nav-item"><a href="/admin/prenota">Nuova Visita</a></li>
            <li class="nav-item"><a href="/gestione-probabilita">Gestione Probabilità</a></li>
        </ul>
        <div class="col-md-2">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<main class="main-container" style="max-width: 1200px;">
    <section class="welcome-section">
        <h1>Pannello di Controllo - Authority <span class="badge-auth">Authority</span></h1>
        <p>Gestisci le visite confermate.</p>
    </section>

    <div style="overflow-x: auto;">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Data/Ora</th>
                    <th>Medico</th>
                    <th>Paziente</th>
                    <th>Conferma</th>
                    <th>Probabilità</th>
                    <th>Prove Attuali</th>
                    <th>Intervento Authority</th>
                </tr>
            </thead>
            <tbody id="authorityBody">
            </tbody>
        </table>
    </div>

    <section class="welcome-section">
            <h1>Sezione Visite pendenti</h1>
        </section>

        <div id="unconfirmedVisitsContainer" style="margin-top: 1rem; overflow-x: auto;">
        </div>

</main>

<div id="toast"></div>

<style>
#toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: white; border-radius: 8px; padding: 1rem 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-size: 0.95rem;
    opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 9999; min-width: 280px; text-align: center; pointer-events: none;
}
#toast.show { opacity: 1 !important; transform: translateX(-50%) translateY(0) !important; }
#toast .toast-title { font-weight: bold; margin-bottom: 0.3rem; }
#toast .toast-body { color: #555; }
#toast.toast-success { border-left: 4px solid #27ae60; }
#toast.toast-success .toast-title { color: #27ae60; }
#toast.toast-error { border-left: 4px solid #e74c3c; }
#toast.toast-error .toast-title { color: #e74c3c; }
/* Lista prove incolonnate */
.prove-list {
    list-style: none;
    margin: 0;
    padding: 0;
}
.prove-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 2px 0;
    white-space: nowrap;
}
.prova-check {
    color: #27ae60;
    font-weight: bold;
}
.prova-cross {
    color: #e74c3c;
    font-weight: bold;
}
</style>
<script>

document.addEventListener('DOMContentLoaded', caricaVisiteConfermate);
document.addEventListener('DOMContentLoaded', caricaVisiteNonConfermate);

async function caricaVisiteConfermate() {
    return await caricaPaginaVisiteConfermate(1);
}

async function caricaVisiteNonConfermate() {
    return await caricaPaginaVisiteNonConfermate(1);
}

async function caricaPaginaVisiteConfermate(pagina) {
    try {
        const queryString = new URLSearchParams({ page: pagina }).toString();
        const [responseVisite, responseUtenti] = await Promise.all([
            fetch(`/admin/sc-visits?${queryString}`, { credentials: 'same-origin' }),
            fetch('/admin/allusers', { credentials: 'same-origin' }) 
        ]);
        
        if (!responseVisite.ok) throw new Error("Errore recupero visite globali");
        
        const visite = await responseVisite.json();
        const utenti = await responseUtenti.json();
        // Mappa id → nome
        const nomeUtente = {};
        utenti.forEach(u => { nomeUtente[u.id] = u.name; });

        const body = document.getElementById('authorityBody');
        body.innerHTML = '';
        
        if (visite.length === 0) {
            body.innerHTML = `
                <tr>
                    <td colspan="7" style="text-align:center; padding:2rem; color:#666;">
                        Non ci sono visite confermate al momento.
                    </td>
                </tr>
            `;
            return;
        }

        visite.forEach(v => {
            const row = document.createElement('tr');
            const dataFormattata = new Date(v.timestamp).toLocaleString('it-IT');
            // Prove incolonnate: nome prova a sinistra, spunta verde/croce rossa a destra
            const proveHtml = v.prove && v.prove.length > 0
            ? '<ul class="prove-list">' + v.prove.map(p => {
                const icona = p.valore
                    ? '<span class="prova-check">&#10003;</span>'
                    : '<span class="prova-cross">&#10007;</span>';
                return `<li><span>${p.tipo}</span>${icona}</li>`;
            }).join('') + '</ul>'
            : '<i>Nessuna</i>';
            const nomeMedico = nomeUtente[v.medico] || v.medico || 'Non assegnato';
            const nomePaziente = nomeUtente[v.paziente] || v.paziente;
            // Bottoni conferma/rifiuta con colori
            const conferma = v.confermata
                ? '<span style="color: #27ae60; font-weight: bold;">✔ Confermata</span>'
                : `
                    <button class="btn-supervise" style="background-color: #27ae60; margin: 0.3rem;"
                        onclick="confermaVisita('${v.id}')">Conferma</button>
                    <button class="btn-supervise" style="background-color: #e74c3c; margin: 0.3rem;"
                        onclick="rifiutaVisita('${v.id}')">Rifiuta</button>
                `;
            // Invia Prova disabilitato se non confermata
            const disabilitaProva = !v.confermata ? 'disabled' : '';
            const coloreInviaProva = v.confermata ? '#8e44ad' : '#aaaaaa';

            row.innerHTML = `
                <td>${dataFormattata}</td>
                <td>${nomeMedico}</td>
                <td>${nomePaziente}</td>
                <td>${conferma}</td>
                <td>${v.probabilita}</td>
                <td>${proveHtml}</td>
                <td>
                    <button class="btn-supervise"
                        style="background-color: ${coloreInviaProva};"
                        onclick="togglePanel('${v.id}')"
                        ${disabilitaProva}>
                        Invia Prova
                    </button>

                    <div id="panel-${v.id}" class="control-panel">
                        <select id="tipo-${v.id}" ${disabilitaProva}>
                            <option value="sintomi">Sintomi</option>
                            <option value="attrezzatura">Attrezzatura</option>
                            <option value="prescrizione">Prescrizione</option>
                            <option value="gps">GPS</option>
                            <option value="conferma">Conferma (Certificato)</option>
                        </select>
                        <input type="checkbox" id="valore-${v.id}" checked="checked">
                        <button class="btn-supervise"
                            style="width: 100%; background-color: ${v.confermata ? '#27ae60' : '#aaaaaa'};"
                            onclick="forzaProva('${v.id}')"
                            ${disabilitaProva}>
                            Esegui Iniezione
                        </button>
                    </div>
                </td>`;
            body.appendChild(row);
        });


        let row = document.createElement('tr');
        row.innerHTML = '';
        if(pagina > 1) {
            row.innerHTML = `<td colspan="3"><button onclick="caricaPaginaVisiteConfermate(${pagina-1})">Indietro</button></td>`;
        }
        else {
            row.innerHTML = '<td colspan="3"></td>';
        }

        if(visite.length > 9) {
            row.innerHTML += `<td colspan="3"><button onclick="caricaPaginaVisiteConfermate(${pagina+1})">Avanti</button></td><td></td>`;
        }

        if(pagina === 1 && visite.length < 10) {
            row = null;
        }
        else {
            body.appendChild(row);
        }
    } catch (err) {
        document.getElementById('authorityBody').innerHTML = 
        '<tr><td colspan="7" style="text-align:center; color:red;">Qualcosa è andato storto</td></tr>';
    }
}

async function caricaPaginaVisiteNonConfermate(pagina) {
    try {
        const queryString = new URLSearchParams({ page: pagina }).toString();
        const [responseVisite, responseUtenti] = await Promise.all([
            fetch(`/admin/unconfirmed-visits?${queryString}`, { credentials: 'same-origin' }),
            fetch('/admin/allusers', { credentials: 'same-origin' }) 
        ]);
        
        if (!responseVisite.ok) throw new Error("Errore recupero visite globali");
        
        const visite = await responseVisite.json();
        const utenti = await responseUtenti.json();
        // Mappa id → nome
        const nomeUtente = {};
        utenti.forEach(u => { nomeUtente[u.id] = u.name; });

        const container = document.getElementById('unconfirmedVisitsContainer');

if (visite.length === 0) {
    container.innerHTML = `
        <p style="
            text-align:center;
            color:#666;
            padding:2rem;
            font-style:italic;
        ">
            Nessuna visita in sospeso.
        </p>
    `;
    return;
}

container.innerHTML = `
    <table class="styled-table">
        <thead>
            <tr>
                <th>Data/Ora</th>
                <th>Medico</th>
                <th>Paziente</th>
                <th>Conferma Visita</th>
            </tr>
        </thead>
        <tbody id="unconfirmedVisits">
        </tbody>
    </table>
`;

const body = document.getElementById('unconfirmedVisits');

            visite.forEach(v => {
                const row = document.createElement('tr');
                const dataFormattata = new Date(v.timestamp).toLocaleString('it-IT');
                const proveHtml = v.prove && v.prove.length > 0 ? v.prove.map(p => p.tipo).join(', ') : '<i>Nessuna</i>';
                const nomeMedico = nomeUtente[v.medico] || v.medico || 'Non assegnato';
                const nomePaziente = nomeUtente[v.paziente] || v.paziente;
                // Bottoni conferma/rifiuta con colori
                const conferma = v.confermata
                    ? '<span style="color: #27ae60; font-weight: bold;">✔ Confermata</span>'
                    : `
                        <button class="btn-supervise" style="background-color: #27ae60; margin: 0.3rem;"
                            onclick="confermaVisita('${v.id}')">Conferma</button>
                        <button class="btn-supervise" style="background-color: #e74c3c; margin: 0.3rem;"
                            onclick="rifiutaVisita('${v.id}')">Rifiuta</button>
                    `;
                // Invia Prova disabilitato se non confermata
                const disabilitaProva = !v.confermata ? 'disabled' : '';
                const coloreInviaProva = v.confermata ? '#8e44ad' : '#aaaaaa';

                row.innerHTML = `
                    <td>${dataFormattata}</td>
                    <td>${nomeMedico}</td>
                    <td>${nomePaziente}</td>
                    <td>${conferma}</td>`;
                body.appendChild(row);
            });

        let row = document.createElement('tr');
        row.innerHTML = '';
        if(pagina > 1) {
            row.innerHTML = `<td colspan="2"><button onclick="caricaPaginaVisiteNonConfermate(${pagina-1})">Indietro</button></td>`;
        }
        else {
            row.innerHTML = '<td colspan="2"></td>';
        }

        if(visite.length > 9) {
            row.innerHTML += `<td colspan="2"><button onclick="caricaPaginaVisiteNonConfermate(${pagina+1})">Avanti</button></td><td></td>`;
        }

        if(pagina === 1 && visite.length < 10) {
            row = null;
        }
        else {
            body.appendChild(row);
        }

    } catch (err) {
        document.getElementById('unconfirmedVisits').innerHTML = 
        '<tr><td colspan="5" style="text-align:center; color:red;">Qualcosa è andato storto</td></tr>';
    }
}

async function caricaTutteLeVisite() {
    caricaVisiteConfermate();
    caricaVisiteNonConfermate();
}


function showToast(titolo, messaggio, tipo = 'toast-success', durata = 3000) {
    const toast = document.getElementById('toast');
    toast.innerHTML = `<div class="toast-title">${titolo}</div><div class="toast-body">${messaggio}</div>`;
    toast.className = tipo;
    void toast.offsetHeight;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), durata);
}

async function confermaVisita(id) {
    const response = await fetch(`/admin/visits/${id}/confirm`, {
        method: 'PUT', credentials: 'same-origin'
    });
    if (response.ok) {
        showToast("✓ Visita confermata", "La visita è stata confermata.", "toast-success");
        setTimeout(() => caricaTutteLeVisite(), 1000);
    } else {
        showToast("✗ Errore", "Impossibile confermare la visita.", "toast-error");
    }
}

async function rifiutaVisita(id) {
    const response = await fetch(`/admin/deletevisit/${id}`, {
        method: 'DELETE', credentials: 'same-origin'
    });
    if (response.ok) {
        showToast("✓ Visita rifiutata", "La visita è stata rimossa.", "toast-success");
        setTimeout(() => caricaTutteLeVisite(), 1000);
    } else {
        showToast("✗ Errore", "Impossibile rifiutare la visita.", "toast-error");
    }
}

function togglePanel(id) {
    const panel = document.getElementById(`panel-${id}`);
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

async function forzaProva(id) {
    const tipo = document.getElementById(`tipo-${id}`).value;
    const valore = document.getElementById(`valore-${id}`).checked;

    console.log('valore: ', valore);

    try {
        const response = await fetch(`/admin/addevidence/${id}`, {
            method: 'POST',
            credentials: 'same-origin', 
            headers: { 
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ tipo: tipo, valore: valore })
        });

        if (response.ok) {
            showToast("✓ Prova inserita", "La prova è stata aggiunta correttamente.", "toast-success");
            setTimeout(() => caricaTutteLeVisite(), 1000);
            caricaTutteLeVisite();
        } else {
            const errData = await response.json();
            showToast("✗ Errore", errData.detail || "Operazione non consentita.", "toast-error");
        }
    } catch (err) {
        showToast("✗ Errore di connessione", err.message, "toast-error");
    }
}
</script>
</body>
</html>
