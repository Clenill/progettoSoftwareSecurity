<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visite Utente - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/functions.js"></script>
</head>
<body>

<!-- Menu di Navigazione -->
<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo"><img src="/images/logo.png"></a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard/authority">Home</a></li>
            <li class="nav-item"><a href="/lista-utenti" class="active">Gestisci Utenti</a></li>
            <li class="nav-item"><a href="/admin/prenota">Nuova Visita</a></li>
        </ul>
        <div class="col-md-2">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<main class="main-container" style="max-width: 1200px;">
    <section class="welcome-section">
        <h1>Visite Utente <span class="badge-auth">Authority</span></h1>
        <p>Storico visite dell'utente selezionato.</p>
    </section>

    <div style="overflow-x: auto;">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Giorno</th>
                    <th>Ora</th>
                    <th>Medico</th>
                    <th>Confermata</th>
                    <th>Prove</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="listaVisite"></tbody>
        </table>
    </div>
</main>

<div id="toast"></div>

<style>
#toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: white; border-radius: 8px; padding: 1rem 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-size: 0.95rem;
    opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 9999; min-width: 280px; text-align: center; pointer-events: none;
}
#toast.show { opacity: 1 !important; transform: translateX(-50%) translateY(0) !important; }
#toast .toast-title { font-weight: bold; margin-bottom: 0.3rem; }
#toast .toast-body { color: #555; }
#toast.toast-success { border-left: 4px solid #27ae60; }
#toast.toast-success .toast-title { color: #27ae60; }
#toast.toast-error { border-left: 4px solid #e74c3c; }
#toast.toast-error .toast-title { color: #e74c3c; }
</style>

<script>

const id = '{{ id }}';

function showToast(titolo, messaggio, tipo = 'toast-success', durata = 3000) {
    const toast = document.getElementById('toast');
    toast.innerHTML = `<div class="toast-title">${titolo}</div><div class="toast-body">${messaggio}</div>`;
    toast.className = tipo;
    void toast.offsetHeight;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), durata);
}

async function caricaStorico() {
    try {
        const [responseVisite, responseUtenti] = await Promise.all([
            fetch(`/admin/visiteutente/${id}`, { credentials: 'same-origin' }),
            fetch('/admin/allusers', { credentials: 'same-origin' })
        ]);

        const visite = await responseVisite.json();
        const utenti = await responseUtenti.json();

        const nomeUtente = {};
        utenti.forEach(u => { nomeUtente[u.id] = u.name; });
        const body = document.getElementById('listaVisite');
        body.innerHTML = '';

        if (visite.length === 0) {
                        body.innerHTML = '<tr><td colspan="6" style="text-align:center;">Nessuna visita in storico.</td></tr>';
            return;
        }

        visite.forEach(v => {
            const dataOggetto = new Date(v.timestamp);
            const giorno = dataOggetto.toLocaleDateString('it-IT');
            const ora = dataOggetto.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

            const nomeMedico = nomeUtente[v.medico] || v.medico || 'Non assegnato';
            const confermataText = v.confermata
                ? '<span style="color: #27ae60; font-weight: bold;">✔ Confermata</span>'
                : '<span style="color: #e67e22; font-weight: bold;">⏳ In attesa</span>';
            const proveHtml = v.prove && v.prove.length > 0
                ? v.prove.map(p => p.tipo).join(', ')
                : 'Nessuna';

            const provaGiaInviata = v.prove && v.prove.some(p => p.tipo === 'conferma');
            const disabilitato = (!v.confermata || provaGiaInviata) ? 'disabled' : '';
            const coloreBottone = provaGiaInviata ? '#27ae60' : (v.confermata ? '#3498db' : '#aaaaaa');
            const testoBottone = provaGiaInviata ? '✓ Prova già inviata' : 'Invia prova';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${giorno}</td>
                <td>${ora}</td>
                <td>${nomeMedico}</td>
                <td>${confermataText}</td>
                <td>${proveHtml}</td>
                <td>
                    <label>Medico presente: </label>
                    <input id="${v.id}-checkbox" type="checkbox"
                        ${v.confermata ? 'checked' : ''} ${disabilitato}>
                    <button onclick="confermaPresenza('${v.id}')"
                        style="background-color: ${coloreBottone};"
                        ${disabilitato}>${testoBottone}</button>
                </td>
            `;
            body.appendChild(row);
        });
        
        
    } catch (err) {
        console.error("Errore caricaStorico:", err);
        document.getElementById('listaVisite').innerHTML = 
                    '<tr><td colspan="6" style="text-align:center; color:red;">Errore nel caricamento dei dati.</td></tr>';
    }
}

async function confermaPresenza(visitId) {
    const checkbox = document.getElementById(`${visitId}-checkbox`);
    if (!checkbox) {
        showToast("✗ Errore", "Elemento non trovato.", "toast-error");
        return;
    }

    try {
        const response = await fetch(`/admin/addevidence/${visitId}`, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'conferma', valore: checkbox.checked })
        });

        if (response.ok) {
            showToast("✓ Prova inviata", "La conferma è stata registrata correttamente.", "toast-success");
            setTimeout(() => caricaStorico(), 1500);
        } else {
            const err = await response.json();
            showToast("✗ Errore", err.detail || "Salvataggio fallito.", "toast-error");
        }
    } catch (err) {
        showToast("✗ Errore di connessione", err.message, "toast-error");
    }
}

document.addEventListener('DOMContentLoaded', () => {
    caricaStorico();
});
</script>
</body>
</html>
