<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - Security Project</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo"><img src="images/logo.png"></a>
            <ul class="nav-menu">
                <li class="nav-item"></li><a href="/registrazione" class="link-login">Non hai un account? Registrati</a></li>
            </ul>
        </div>
    </nav>

    <h1>Accedi</h1>
<div class="login-container">
    <div id="error-msg" class="error">Credenziali errate</div>
    <form id="loginForm">
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Accedi</button>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');

    try {
        const response = await fetch('/auth/login', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        });

        if (!response.ok) {
            errorMsg.style.display = 'block';
            return;
        }

        const data = await response.json();
        
        // Salviamo il token JWT nel localStorage per le chiamate future
        localStorage.setItem('token', data.access_token);

        // Decodifica JWT lato client per capire il ruolo
        const payload = JSON.parse(atob(data.access_token.split('.')[1]));
        const role = payload.role;

        // Reindirizzamento in base al ruolo dell'enum
        if (role === 'utente') {
            window.location.href = '/dashboard/utente';
        } else if (role === 'staff') {
            window.location.href = '/dashboard/staff';
        } else if (role === 'admin') {
            window.location.href = '/dashboard/authority';
        } 
        else if (role === 'amministratore') {
            window.location.href = '/dashboard/admin';
        } else {
            alert('Ruolo non riconosciuto.');
        }

    } catch (err) {
        errorMsg.textContent = "Errore di connessione al server";
        errorMsg.style.display = 'block';
    }
});
</script>
</body>
</html>
