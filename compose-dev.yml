
services:
    hardhat-node:
        container_name: hardhat-node
        build:
            dockerfile: ./Dockerfile.hardhat
        environment:
            W3_ACCOUNT: ${W3_ACCOUNT:-0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266}
            PRIVATE_KEY: ${PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
            CONTRACT_NAME: ${CONTRACT_NAME}
            SCALE: ${SCALE}
        volumes:
            - ./blockchain/ignition/deployments:/usr/blockchain/ignition/deployments
        command: >
            sh -c "
            rm -rf /usr/blockchain/ignition/deployments/* &&
            (while ! nc -z 127.0.0.1 8545; do sleep 1; done && npx hardhat ignition deploy /usr/blockchain/ignition/modules/${CONTRACT_NAME}.ts --network localhost) & 
            npx hardhat node --hostname 0.0.0.0
            "

    app:
        depends_on:
            - hardhat-node
        environment:
            RPC_URL: http://hardhat-node:8545
            DEPLOYMENTS_PATH: /var/deployments/chain-31337
            W3_ACCOUNT: ${DEV_ACCOUNT:-0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266}
            PRIVATE_KEY: ${DEV_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}

