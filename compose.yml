
services:
    database:
        container_name: database
        image: postgres:18.4-alpine3.23
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_PORT: ${DB_PORT}
            POSTGRES_DB: ${DB_NAME}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
            interval: 10s
            retries: 5
            timeout: 10s
        networks:
            internal-network:
                ipv4_address: 172.20.0.2

    app:
        container_name: app
        build:
            dockerfile: ./Dockerfile.app
        ports:
            - "${APP_PORT}:8000"
        environment:
            LOG_PATH: /var/log
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_HOST: database
            DB_PORT: ${DB_PORT}
            DB_NAME: ${DB_NAME}
            APP_PORT: ${APP_PORT}
            SECRET_KEY: ${SECRET_KEY}
            ALGORITHM: ${ALGORITHM}
            ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
            MAX_REQUESTS: ${MAX_REQUESTS}
            CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS}
            MAX_LOG_FILE_SIZE: ${MAX_LOG_FILE_SIZE}
            LOG_RETENTION_PERIOD: ${LOG_RETENTION_PERIOD}
            CONTRACT_NAME: ${CONTRACT_NAME}
            ARTIFACTS_PATH: /var/artifacts
            DEPLOYMENTS_PATH: /var/deployments/chain-${NETWORK_ID}
            NETWORK_ID: ${NETWORK_ID}
            SCALE: ${SCALE}
            PRIVATE_KEY: ${PRIVATE_KEY}
            USER_ID: ${USER_ID}
            GROUP_ID: ${GROUP_ID}
        entrypoint: ./entrypoint.sh
        depends_on:
            database:
                condition: service_healthy
        volumes:
            - ./logs:/var/log
            - ./ssl:/etc/ssl
            - blockchain_artifacts:/var/artifacts
            - blockchain_deployments:/var/deployments
        networks:
            internal-network:
                ipv4_address: 172.20.0.3

volumes:
    blockchain_artifacts:
    blockchain_deployments:
    blockchain_cache:

networks:
    internal-network:
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/16

